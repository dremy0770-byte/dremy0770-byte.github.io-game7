<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🫧 버블검 카페 / Bubblegum Café</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --lav:#F0E6FF; --lav2:#D8C8F8; --peach:#FFD6C0; --mint:#C8F0E8;
  --cream:#FFFAF5; --deep:#7B5BA6; --text:#5A3E6B; --wood:#E8C49A;
}
body { font-family:'Nunito',sans-serif; background:var(--cream); overflow:hidden; user-select:none; height:100vh; }

/* SCREENS */
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.35s; z-index:10; }
.screen.hidden { opacity:0; pointer-events:none; }

/* LANG BTN - 고정 우상단 */
#langBtn {
  position:fixed; top:10px; right:12px; z-index:9999;
  background:rgba(255,255,255,0.9); border:2px solid var(--lav2);
  border-radius:50px; padding:5px 12px; font-size:clamp(13px,3.5vw,17px);
  font-weight:800; color:var(--deep); cursor:pointer;
  box-shadow:0 2px 8px rgba(123,91,166,0.15);
  transition:all 0.15s; backdrop-filter:blur(6px);
}
#langBtn:hover { background:var(--lav); transform:scale(1.05); }
/* MUTE BTN */
#muteBtn {
  position:fixed; top:10px; right:clamp(70px,18vw,100px); z-index:9999;
  background:rgba(255,255,255,0.9); border:2px solid var(--lav2);
  border-radius:50px; padding:5px 12px; font-size:clamp(13px,3.5vw,17px);
  font-weight:800; color:var(--deep); cursor:pointer;
  box-shadow:0 2px 8px rgba(123,91,166,0.15);
  transition:all 0.15s; backdrop-filter:blur(6px);
}
#muteBtn:hover { background:var(--lav); transform:scale(1.05); }


/* NICKNAME */
#nickScreen { background:linear-gradient(160deg,#FFF0F8,#EDE0FF,#D8F4EC); }
.nick-cat { font-size:clamp(50px,14vw,80px); animation:floatY 2.5s ease-in-out infinite; margin-bottom:8px; }
.nick-title { font-size:clamp(20px,5.5vw,34px); font-weight:900; color:var(--deep); margin-bottom:6px; text-shadow:2px 2px 0 #fff; text-align:center; padding:0 20px; }
.nick-sub { font-size:clamp(12px,3vw,15px); color:#B07EC0; font-weight:600; margin-bottom:24px; }
.nick-input {
  border:2.5px solid var(--lav2); border-radius:50px; padding:14px 24px;
  font-size:clamp(16px,4vw,20px); font-family:'Nunito',sans-serif; font-weight:700;
  color:var(--text); background:#fff; outline:none; width:clamp(220px,70vw,300px);
  text-align:center; transition:border-color 0.2s; margin-bottom:20px; display:block;
}
.nick-input:focus { border-color:var(--deep); }
.nick-input::placeholder { color:#CDB8E8; }

/* TITLE */
#titleScreen { background:linear-gradient(160deg,#FFF0F8,#EDE0FF,#D8F4EC); }
.floating-bg { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.bg-item { position:absolute; font-size:clamp(18px,5vw,32px); opacity:0.15; animation:floatRnd var(--d) ease-in-out infinite; animation-delay:var(--dl); }
.title-bubble { font-size:clamp(55px,13vw,90px); animation:floatY 3s ease-in-out infinite; }
.game-title { font-size:clamp(24px,6.5vw,50px); font-weight:900; color:var(--deep); text-shadow:3px 3px 0 #fff,5px 5px 0 rgba(123,91,166,0.2); margin:6px 0 2px; }
.game-sub { font-size:clamp(11px,2.8vw,16px); color:#B07EC0; font-weight:600; margin-bottom:8px; text-align:center; padding:0 16px; }
.player-badge { background:rgba(255,255,255,0.8); border-radius:50px; padding:7px 20px; font-size:clamp(12px,3vw,15px); font-weight:700; color:var(--deep); border:2px solid var(--lav2); margin-bottom:18px; }
.best-row { font-size:clamp(11px,2.8vw,14px); color:var(--deep); font-weight:700; opacity:0.75; margin-top:10px; }

/* BUTTONS */
.btn-main {
  background:linear-gradient(135deg,var(--deep),#B07EC0); color:#fff; border:none;
  border-radius:50px; padding:15px 44px; font-size:clamp(14px,3.8vw,20px);
  font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer;
  box-shadow:0 6px 20px rgba(123,91,166,0.38); transition:transform 0.15s,box-shadow 0.15s; margin:7px;
}
.btn-main:hover { transform:translateY(-2px); }
.btn-main:active { transform:translateY(1px); }
.btn-sub {
  background:#fff; color:var(--deep); border:2.5px solid var(--deep);
  border-radius:50px; padding:11px 32px; font-size:clamp(12px,3.2vw,16px);
  font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; transition:all 0.15s; margin:6px;
}
.btn-sub:hover { background:var(--lav); }

/* ══ TUTORIAL OVERLAY ══ */
#tutorialOverlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(60,30,90,0.72); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  opacity:1; transition:opacity 0.4s;
}
#tutorialOverlay.hidden { opacity:0; pointer-events:none; }

.tutorial-board {
  background:linear-gradient(160deg,#FFF8F0,#F5EEFF);
  border-radius:24px; padding:clamp(16px,4vw,28px) clamp(18px,5vw,32px);
  max-width:clamp(300px,88vw,420px); width:100%;
  border:3px solid var(--lav2);
  box-shadow:0 20px 60px rgba(60,30,90,0.3);
  position:relative; max-height:90vh; overflow-y:auto;
}
.tut-header {
  text-align:center; margin-bottom:14px;
}
.tut-emoji { font-size:clamp(32px,8vw,48px); }
.tut-title { font-size:clamp(16px,4.5vw,24px); font-weight:900; color:var(--deep); margin-top:4px; }
.tut-subtitle { font-size:clamp(11px,2.8vw,14px); color:#B07EC0; font-weight:600; margin-top:2px; }

.tut-section { margin:12px 0 6px; font-size:clamp(10px,2.5vw,13px); font-weight:800; color:#B07EC0; text-transform:uppercase; letter-spacing:0.5px; }

.tut-flow {
  display:flex; align-items:center; justify-content:center;
  gap:6px; flex-wrap:wrap;
  background:rgba(240,230,255,0.5); border-radius:14px; padding:10px 12px; margin-bottom:10px;
}
.tut-flow-step { text-align:center; }
.tut-flow-icon { font-size:clamp(20px,5vw,28px); }
.tut-flow-lbl { font-size:clamp(9px,2.2vw,11px); font-weight:700; color:var(--deep); margin-top:2px; }
.tut-arrow { font-size:clamp(14px,3.5vw,18px); color:var(--lav2); font-weight:900; }

.tut-rows { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
.tut-row {
  display:flex; align-items:center; gap:10px;
  background:rgba(255,255,255,0.7); border-radius:12px; padding:7px 12px;
  border:1.5px solid rgba(123,91,166,0.1);
}
.tut-icon { font-size:clamp(18px,4.5vw,24px); width:32px; text-align:center; flex-shrink:0; }
.tut-name { font-weight:800; font-size:clamp(11px,2.8vw,14px); color:var(--text); }
.tut-desc { font-size:clamp(10px,2.2vw,12px); color:#9B7CBB; font-weight:600; }

.tut-tip {
  background:linear-gradient(135deg,#FFF0A0,#FFE0C0); border-radius:12px;
  padding:8px 14px; margin:8px 0;
  font-size:clamp(11px,2.8vw,13px); font-weight:700; color:#8B5500;
  border:1.5px solid #FFD080;
}

.tut-page-dots { display:flex; justify-content:center; gap:7px; margin:10px 0 8px; }
.tut-dot { width:8px; height:8px; border-radius:50%; background:var(--lav2); transition:all 0.2s; }
.tut-dot.active { background:var(--deep); transform:scale(1.3); }

.tut-btn-row { display:flex; gap:8px; justify-content:center; margin-top:8px; }
.tut-btn-prev { background:#fff; color:var(--deep); border:2px solid var(--lav2); border-radius:50px; padding:10px 24px; font-size:clamp(12px,3vw,15px); font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; transition:all 0.15s; }
.tut-btn-next { background:linear-gradient(135deg,var(--deep),#B07EC0); color:#fff; border:none; border-radius:50px; padding:10px 28px; font-size:clamp(12px,3vw,15px); font-weight:800; font-family:'Nunito',sans-serif; cursor:pointer; transition:transform 0.15s; }
.tut-btn-next:hover { transform:translateY(-2px); }
.tut-skip { text-align:center; margin-top:6px; font-size:clamp(10px,2.5vw,12px); color:#B07EC0; font-weight:600; cursor:pointer; text-decoration:underline; }

/* GAME */
#gameScreen { background:transparent; justify-content:flex-start; }
.hud {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; justify-content:space-between; align-items:center;
  padding:clamp(8px,2.5vw,14px) clamp(12px,3.5vw,24px);
  background:rgba(255,255,255,0.72); backdrop-filter:blur(10px);
  border-bottom:2px solid rgba(123,91,166,0.1);
}
.hud-block { display:flex; flex-direction:column; align-items:center; min-width:60px; }
.hud-lbl { font-size:clamp(8px,1.8vw,11px); font-weight:700; color:#B07EC0; text-transform:uppercase; letter-spacing:0.4px; }
.hud-val { font-size:clamp(18px,4.5vw,30px); font-weight:900; color:var(--deep); line-height:1.1; }
.hud-val.red { color:#E05080; animation:pulse 0.5s infinite; }
.hud-nick { font-size:clamp(10px,2.5vw,13px); font-weight:700; color:var(--deep); opacity:0.7; }

#cafeBg { position:fixed; bottom:0; left:0; right:0; height:clamp(160px,38vh,280px); z-index:1; pointer-events:none; }
#gameCanvas { position:fixed; inset:0; width:100%; height:100%; z-index:2; touch-action:none; cursor:pointer; }

.ingr-bar {
  position:fixed; bottom:clamp(155px,37vh,275px); left:50%; transform:translateX(-50%);
  display:flex; gap:8px; z-index:50;
  background:rgba(255,255,255,0.82); backdrop-filter:blur(8px);
  border-radius:50px; padding:6px 16px; border:2px solid rgba(123,91,166,0.15);
}
.ingr-chip { display:flex; align-items:center; gap:4px; font-size:clamp(12px,3vw,15px); font-weight:800; color:var(--text); }
.ingr-chip span { font-size:clamp(14px,3.5vw,18px); }

.guests-area {
  position:fixed; bottom:0; left:0; right:0; height:clamp(155px,37vh,275px);
  z-index:20; display:flex; align-items:flex-end; justify-content:space-around;
  padding:0 clamp(8px,3vw,24px) clamp(6px,2vw,14px);
}
.guest-seat { display:flex; flex-direction:column; align-items:center; width:clamp(80px,24vw,120px); }
.table-top { width:clamp(70px,22vw,110px); height:clamp(10px,2.5vw,18px); background:linear-gradient(180deg,#E8C49A,#C8956A); border-radius:8px 8px 0 0; box-shadow:0 3px 0 #A87040; position:relative; }
.table-leg { width:clamp(44px,14vw,70px); height:clamp(14px,3.5vw,24px); background:linear-gradient(180deg,#C8956A,#A87040); border-radius:0 0 4px 4px; margin:0 auto; }
.guest-wrap { position:relative; margin-bottom:2px; width:clamp(48px,14vw,72px); height:clamp(48px,14vw,72px); }
.cat-body { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:clamp(34px,10vw,52px); height:clamp(28px,8vw,42px); border-radius:50% 50% 40% 40%; }
.cat-head { position:absolute; bottom:clamp(22px,7vw,36px); left:50%; transform:translateX(-50%); width:clamp(28px,8.5vw,44px); height:clamp(26px,8vw,40px); border-radius:50%; }
.cat-ear-l,.cat-ear-r { position:absolute; bottom:clamp(44px,13vw,68px); width:0; height:0; border-left:clamp(5px,1.5vw,8px) solid transparent; border-right:clamp(5px,1.5vw,8px) solid transparent; border-bottom:clamp(10px,3vw,15px) solid #C8A0D8; }
.cat-ear-l { left:calc(50% - clamp(16px,5vw,26px)); }
.cat-ear-r { right:calc(50% - clamp(16px,5vw,26px)); }
.cat-eye-l,.cat-eye-r { position:absolute; bottom:clamp(30px,9vw,48px); width:clamp(4px,1.2vw,7px); height:clamp(4px,1.2vw,7px); background:#5A3E6B; border-radius:50%; transition:height 0.3s; }
.cat-eye-l { left:calc(50% - clamp(8px,2.5vw,13px)); }
.cat-eye-r { right:calc(50% - clamp(8px,2.5vw,13px)); }
.cat-eye-l.happy,.cat-eye-r.happy { height:2px; border-radius:4px; }
.cat-nose { position:absolute; bottom:clamp(26px,8vw,42px); left:50%; transform:translateX(-50%); width:clamp(3px,1vw,5px); height:clamp(2px,0.8vw,4px); background:#E88080; border-radius:50%; }
.cat-mouth { position:absolute; bottom:clamp(22px,6.5vw,36px); left:50%; transform:translateX(-50%); width:clamp(8px,2.5vw,12px); height:clamp(4px,1.2vw,6px); border-bottom:2px solid #E88080; border-radius:0 0 50% 50%; }
.cat-tail { position:absolute; bottom:0; right:clamp(-6px,-2vw,-10px); width:clamp(10px,3vw,16px); height:clamp(22px,6.5vw,36px); border-radius:50% 50% 50% 0; transform:rotate(20deg); transform-origin:bottom left; animation:tailWag 2s ease-in-out infinite; }
.table-food { position:absolute; top:-clamp(12px,3.5vw,20px); left:50%; transform:translateX(-50%); font-size:clamp(12px,3.5vw,20px); animation:bounceSmall 0.4s ease-out; }
.speech { position:absolute; top:-clamp(22px,6.5vw,36px); left:50%; transform:translateX(-50%); background:#fff; border-radius:12px; padding:3px 8px; font-size:clamp(10px,2.8vw,14px); font-weight:700; color:var(--text); white-space:nowrap; border:2px solid var(--lav2); box-shadow:0 2px 6px rgba(0,0,0,0.08); }
.speech::after { content:''; position:absolute; bottom:-7px; left:50%; transform:translateX(-50%); border-left:6px solid transparent; border-right:6px solid transparent; border-top:7px solid var(--lav2); }
.speech.hidden { display:none; }
.happy-bar-wrap { display:flex; gap:clamp(2px,0.8vw,4px); margin-bottom:4px; }
.heart { font-size:clamp(10px,2.8vw,16px); transition:all 0.3s; }
.heart.empty { filter:grayscale(1); opacity:0.3; }
.guest-name { font-size:clamp(9px,2.2vw,12px); font-weight:700; color:var(--deep); opacity:0.8; margin-bottom:2px; }

#comboEl { position:fixed; top:clamp(62px,14vw,90px); left:50%; transform:translateX(-50%); font-size:clamp(16px,4.5vw,26px); font-weight:900; color:#E87040; text-shadow:2px 2px 0 #fff; opacity:0; transition:opacity 0.3s; z-index:99; pointer-events:none; white-space:nowrap; }

.cafe-happy-bar { position:fixed; top:clamp(56px,13vw,82px); left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:6px; z-index:98; background:rgba(255,255,255,0.75); border-radius:50px; padding:4px 14px; border:2px solid rgba(123,91,166,0.12); backdrop-filter:blur(6px); }
.cafe-happy-label { font-size:clamp(9px,2.2vw,12px); font-weight:700; color:#B07EC0; }
.cafe-happy-hearts { display:flex; gap:2px; font-size:clamp(11px,2.8vw,15px); }

/* RESULT */
#resultScreen { background:linear-gradient(160deg,#FFF0F8,#EDE0FF,#D8F4EC); padding:20px; text-align:center; overflow-y:auto; }
.res-cat { font-size:clamp(48px,13vw,80px); animation:bounceIn 0.5s; }
.res-title { font-size:clamp(20px,5.5vw,34px); font-weight:900; color:var(--deep); margin:6px 0; }
.res-score-lbl { font-size:clamp(11px,2.8vw,14px); color:#B07EC0; font-weight:700; }
.res-score { font-size:clamp(38px,11vw,72px); font-weight:900; color:var(--deep); line-height:1; }
.new-best { font-size:clamp(13px,3.5vw,18px); color:#E87040; font-weight:800; animation:floatY 1s ease-in-out infinite; margin:4px 0; }
.res-report { background:rgba(255,255,255,0.8); border-radius:20px; padding:clamp(12px,3vw,20px) clamp(16px,4vw,28px); margin:12px auto; max-width:340px; width:100%; border:2px solid rgba(123,91,166,0.12); text-align:left; }
.res-report-title { font-size:clamp(12px,3vw,15px); font-weight:800; color:var(--deep); margin-bottom:8px; text-align:center; }
.res-row { display:flex; justify-content:space-between; align-items:center; font-size:clamp(12px,3vw,14px); font-weight:700; color:var(--text); padding:3px 0; border-bottom:1px solid rgba(123,91,166,0.08); }
.res-row:last-child { border:none; }
.res-row-val { color:var(--deep); font-weight:800; }
.best-guest-box { background:linear-gradient(135deg,var(--lav),var(--peach)); border-radius:16px; padding:10px 16px; margin-top:8px; text-align:center; }
.best-guest-name { font-size:clamp(14px,3.5vw,18px); font-weight:900; color:var(--deep); }
.best-guest-quote { font-size:clamp(11px,2.8vw,13px); color:#9B7CBB; font-weight:600; margin-top:3px; }

/* HOW SCREEN */
#howScreen { background:linear-gradient(160deg,#FFF0F8,#EDE0FF,#D8F4EC); padding:20px; overflow-y:auto; text-align:center; }
.how-title { font-size:clamp(18px,5vw,30px); font-weight:900; color:var(--deep); margin-bottom:16px; }
.how-sec { font-size:clamp(11px,2.8vw,14px); font-weight:700; color:#B07EC0; margin:10px 0 6px; text-transform:uppercase; letter-spacing:0.5px; }
.guide-list { display:flex; flex-direction:column; gap:7px; width:100%; max-width:340px; margin:0 auto; }
.guide-row { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.7); border-radius:14px; padding:9px 14px; text-align:left; border:2px solid rgba(123,91,166,0.1); }
.guide-icon { font-size:clamp(20px,5.5vw,28px); width:36px; text-align:center; flex-shrink:0; }
.guide-name { font-weight:800; font-size:clamp(12px,3vw,15px); color:var(--text); }
.guide-desc { font-size:clamp(10px,2.5vw,12px); color:#9B7CBB; font-weight:600; }

/* PARTICLES */
.particle { position:fixed; pointer-events:none; z-index:200; border-radius:50%; animation:pFly var(--d) ease-out forwards; }
.score-pop { position:fixed; pointer-events:none; z-index:201; font-size:clamp(14px,4vw,22px); font-weight:900; color:var(--deep); text-shadow:1px 1px 0 #fff; animation:sFly 0.9s ease-out forwards; }
.serve-pop { position:fixed; pointer-events:none; z-index:201; font-size:clamp(16px,4.5vw,24px); font-weight:900; color:#E87040; text-shadow:2px 2px 0 #fff; animation:sFly 1.1s ease-out forwards; white-space:nowrap; }

@keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-11px)} }
@keyframes floatRnd { 0%,100%{transform:translateY(0) rotate(0deg)} 40%{transform:translateY(calc(var(--a,10) * -1px)) rotate(4deg)} 70%{transform:translateY(calc(var(--a,10) * 0.4px)) rotate(-3deg)} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.14)} }
@keyframes bounceIn { 0%{transform:scale(0.2);opacity:0} 60%{transform:scale(1.18)} 100%{transform:scale(1);opacity:1} }
@keyframes bounceSmall { 0%{transform:translateX(-50%) scale(0.3)} 60%{transform:translateX(-50%) scale(1.2)} 100%{transform:translateX(-50%) scale(1)} }
@keyframes tailWag { 0%,100%{transform:rotate(20deg)} 50%{transform:rotate(35deg)} }
@keyframes pFly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.1)} }
@keyframes sFly { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-55px) scale(1.25)} }
</style>
</head>
<body>

<!-- 언어 버튼 (항상 표시) -->
<button id="langBtn" onclick="toggleLang()">🇺🇸 EN</button>
<button id="muteBtn" onclick="toggleMute()">🔊</button>

<!-- ══ TUTORIAL OVERLAY ══ -->
<div id="tutorialOverlay" class="hidden">
  <div class="tutorial-board" id="tutBoard">
    <!-- JS로 렌더링 -->
  </div>
</div>

<!-- ══ NICKNAME ══ -->
<div class="screen" id="nickScreen">
  <div class="nick-cat">😸</div>
  <div class="nick-title" id="nick-title-txt">버블검 카페에 오신 걸 환영해요!</div>
  <div class="nick-sub" id="nick-sub-txt">닉네임을 알려주세요 🐾</div>
  <input class="nick-input" id="nickInput" type="text" maxlength="10" autocomplete="off">
  <button class="btn-main" onclick="saveNick()" id="nick-btn-txt">✨ 시작하기</button>
</div>

<!-- ══ TITLE ══ -->
<div class="screen hidden" id="titleScreen">
  <div class="floating-bg" id="floatBg"></div>
  <div class="title-bubble">🫧</div>
  <div class="game-title">버블검 카페</div>

function loadSave() {
  try {
    const d = JSON.parse(localStorage.getItem('bgcafe_v3') || '{}');
    playerName   = d.name   || '';
    bestScore    = d.best   || 0;
    totalPlays   = d.plays  || 0;
    tutorialSeen = d.tutSeen|| false;
    lang         = d.lang   || 'ko';
  } catch(e) {}
}
function writeSave() {
  try {
    localStorage.setItem('bgcafe_v3', JSON.stringify({name:playerName,best:bestScore,plays:totalPlays,tutSeen:tutorialSeen,lang}));
  } catch(e) {}
}

function showTutorial(fromMenu) {
  tutPage = 0;
  renderTutPage(fromMenu);
  document.getElementById('tutorialOverlay').classList.remove('hidden');
}
function hideTutorial() {
  document.getElementById('tutorialOverlay').classList.add('hidden');
  tutorialSeen = true;
  writeSave();
}
function renderTutPage(fromMenu) {
  const pages = t().tut;
  const p = pages[tutPage];
  const isLast = tutPage === pages.length - 1;
  const L = t();

  let flowHTML = '';
  if (p.flow) {
    flowHTML = `<div class="tut-section">${p.section}</div>
    <div class="tut-flow">
      ${p.flow.map((s,i) => `
        <div class="tut-flow-step"><div class="tut-flow-icon">${s.icon}</div><div class="tut-flow-lbl">${s.lbl}</div></div>
        ${i < p.flow.length-1 ? '<div class="tut-arrow">→</div>' : ''}
      `).join('')}
    </div>`;
  }
  let rowsHTML = '';
  if (p.rows) {
    rowsHTML = `<div class="tut-section">${p.section}</div>
    <div class="tut-rows">
      ${p.rows.map(r => `<div class="tut-row"><div class="tut-icon">${r.icon}</div><div><div class="tut-name">${r.name}</div><div class="tut-desc">${r.desc}</div></div></div>`).join('')}
    </div>`;
  }
  const tipHTML = p.tip ? `<div class="tut-tip">${p.tip}</div>` : '';
  const dots = pages.map((_,i) => `<div class="tut-dot${i===tutPage?' active':''}"></div>`).join('');
  const prevBtn = tutPage > 0 ? `<button class="tut-btn-prev" onclick="tutNav(-1)">←</button>` : '';
  const nextLabel = isLast ? (lang==='ko'?'시작하기! 🎉':'Start! 🎉') : (lang==='ko'?'다음 →':'Next →');
  const skipTxt = lang==='ko' ? '튜토리얼 건너뛰기' : 'Skip tutorial';

  document.getElementById('tutBoard').innerHTML = `
    <div class="tut-header">
      <div class="tut-emoji">${p.emoji}</div>
      <div class="tut-title">${p.title}</div>
      <div class="tut-subtitle">${p.subtitle}</div>
    </div>
    ${flowHTML}${rowsHTML}${tipHTML}
    <div class="tut-page-dots">${dots}</div>
    <div class="tut-btn-row">
      ${prevBtn}
      <button class="tut-btn-next" onclick="tutNav(1,'${fromMenu||false}')">${nextLabel}</button>
    </div>
    ${!fromMenu ? `<div class="tut-skip" onclick="hideTutorial()">${skipTxt}</div>` : ''}
  `;
}
function tutNav(dir, fromMenu) {
  const pages = t().tut;
  if (dir > 0 && tutPage >= pages.length - 1) { hideTutorial(); return; }
  tutPage = Math.max(0, Math.min(pages.length-1, tutPage + dir));
  renderTutPage(fromMenu === 'true');
}

function catName() {
  const pool = lang==='ko' ? CAT_NAMES_KO : CAT_NAMES_EN;
  return pool[Math.floor(Math.random()*pool.length)];
}
function createGuest(slot) {
  const ci = Math.floor(Math.random()*CAT_COLORS.length);
  return { slot, name:catName(), color:CAT_COLORS[ci], marking:CAT_MARKINGS[ci],
    happy:4, maxHappy:5, wants:Math.floor(Math.random()*4), totalServed:0 };
}
function buildGuestsArea() {
  const area = document.getElementById('guestsArea');
  area.innerHTML = ''; guests = [];
  for (let i = 0; i < 3; i++) { const g = createGuest(i); guests.push(g); area.appendChild(makeGuestEl(g)); }
}
function makeGuestEl(g) {
  const wrap = document.createElement('div');
  wrap.className = 'guest-seat'; wrap.id = `seat-${g.slot}`;
  wrap.innerHTML = `
    <div class="guest-name">${g.name}</div>

    <div class="guest-wrap" id="gwrap-${g.slot}">
      <div class="speech" id="speech-${g.slot}">${MENUS[g.wants].emoji} ${t().wantMsg('')}</div>
      <div class="cat-ear-l" style="border-bottom-color:${g.color}"></div>
      <div class="cat-ear-r" style="border-bottom-color:${g.color}"></div>
      <div class="cat-head" style="background:${g.color}"></div>
      <div class="cat-eye-l" id="ceye-l-${g.slot}"></div>
      <div class="cat-eye-r" id="ceye-r-${g.slot}"></div>
      <div class="cat-nose"></div><div class="cat-mouth"></div>
      <div class="cat-body" style="background:${g.marking}"></div>
      <div class="cat-tail" style="background:${g.color}"></div>
      <div class="table-food hidden" id="food-${g.slot}"></div>
    </div>
    <div class="table-top"></div><div class="table-leg"></div>`;
  // fix speech
  wrap.querySelector(`#speech-${g.slot}`).textContent = MENUS[g.wants].emoji + ' ' + (lang==='ko'?'주세요!':'please!');
  return wrap;
}
function hHearts(h,max) { let s=''; for(let i=0;i<max;i++) s+=`<span class="heart${i<h?'':' empty'}">♥</span>`; return s; }
function updateGuestHappy(g) {
  const bar = document.getElementById(`hbar-${g.slot}`);
  if (bar) bar.innerHTML = hHearts(g.happy, g.maxHappy);
  const el = document.getElementById(`ceye-l-${g.slot}`);
  const er = document.getElementById(`ceye-r-${g.slot}`);
  if (el && er) { el.classList.toggle('happy',g.happy>=4); er.classList.toggle('happy',g.happy>=4); }
}
function updateCafeHappy() {
  const avg = guests.length ? guests.reduce((s,g)=>s+g.happy,0)/(guests.length*5) : 0;
  const hearts = document.getElementById('cafeHappyHearts');
  const filled = Math.round(avg*5);
  let s=''; for(let i=0;i<5;i++) s+=`<span style="opacity:${i<filled?1:0.25}">♥</span>`;
  hearts.innerHTML = s;
}
function serveGuest(menuIdx, guestIdx) {
  const g = guests[guestIdx]; if (!g) return;
  const menu = MENUS[menuIdx];
  const isWanted = g.wants === menuIdx;
  g.happy = Math.min(g.maxHappy, g.happy + (isWanted?2:1));
  g.totalServed++; serveCount++;
  const foodEl = document.getElementById(`food-${g.slot}`);
  if (foodEl) { foodEl.textContent=menu.emoji; foodEl.classList.remove('hidden'); setTimeout(()=>foodEl.classList.add('hidden'),2000); }
  const speech = document.getElementById(`speech-${g.slot}`);
  if (speech) {
    speech.textContent = t().happyMsg(isWanted);
    setTimeout(()=>{ if(speech) speech.textContent = MENUS[g.wants].emoji+' '+(lang==='ko'?'주세요!':'please!'); },2000);
  }
  updateGuestHappy(g); updateCafeHappy();
  const pts = menu.pts * Math.max(1,combo); score += pts; updateHUD();
  const seat = document.getElementById(`seat-${g.slot}`);
  if (seat) showServePop(seat,`${menu.emoji} +${pts}`);
  spawnParticles(W/2,H*0.55,isWanted?'#FFB3D4':'#C8F0E8',8); playPop('serve');
  if (g.happy >= g.maxHappy) setTimeout(()=>guestLeave(g,true),1800);
}
function guestLeave(g, happy) {
  if (!gameRunning) return;
  if (!happy) guestsLeft++;
  const seat = document.getElementById(`seat-${g.slot}`);
  if (seat) { seat.style.opacity='0'; seat.style.transition='opacity 0.5s'; }
  setTimeout(()=>{
    if (!gameRunning) return;
    const ng = createGuest(g.slot); guests[g.slot] = ng;
    const area = document.getElementById('guestsArea');
    const old = document.getElementById(`seat-${g.slot}`);
    if (old) area.replaceChild(makeGuestEl(ng), old);
    updateCafeHappy();
  }, 800);
}

function updateIngrUI() {
  document.getElementById('ingrW').textContent=ingr.w;
  document.getElementById('ingrT').textContent=ingr.t;
  document.getElementById('ingrF').textContent=ingr.f;
}
function tryServe() {
  const sorted = [...MENUS].map((m,i)=>({...m,i})).sort((a,b)=>b.pts-a.pts);
  for (const menu of sorted) {
    if (ingr.w>=menu.needs.w && ingr.t>=menu.needs.t && ingr.f>=menu.needs.f) {
      let target = guests.findIndex(g=>g&&g.wants===menu.i);
      if (target===-1) target = guests.findIndex(g=>g);
      if (target===-1) return;
      ingr.w-=menu.needs.w; ingr.t-=menu.needs.t; ingr.f-=menu.needs.f;
      updateIngrUI(); serveGuest(menu.i,target); return;
    }
  }
}

function startGame() {
  score=0; timeLeft=60; combo=0; maxCombo=0;
  bubblesPopped=0; serveCount=0; guestsLeft=0;
  ingr={w:0,t:0,f:0}; bubbles=[]; lastSpawn=0;
  totalPlays++; writeSave();
  showScreen('gameScreen');
  buildCafeBg(); buildGuestsArea(); updateIngrUI(); updateCafeHappy();
  initCanvas(); updateHUD();
  document.getElementById('nickEl').textContent = playerName;
  gameRunning = true;
  // BGM 제거됨 else playBGM();
  clearInterval(timerInt);
  timerInt = setInterval(()=>{
    if (!gameRunning) return;
    timeLeft--; updateHUD();
    if (timeLeft<=0) { timeLeft=0; endGame(); }
  },1000);
  clearInterval(happyDecayInt);
  happyDecayInt = setInterval(()=>{
    if (!gameRunning) return;
    guests.forEach(g=>{ if(!g)return; g.happy=Math.max(0,g.happy-1); updateGuestHappy(g); if(g.happy<=0) guestLeave(g,false); });
    updateCafeHappy();
  },10000);
  if (animFrame) cancelAnimationFrame(animFrame);
  loop(0);
}
function stopGame() {
  gameRunning=false; clearInterval(timerInt); clearInterval(happyDecayInt);
  if (animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  // 오디오 컨텍스트 정지 → 게임 꺼도 소리 안남
  if (audioCtx) { audioCtx.suspend(); }
}
function initCanvas() {
  canvas=document.getElementById('gameCanvas'); ctx=canvas.getContext('2d'); resize();
  canvas.onclick=onTap;
  canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];onTap({clientX:t.clientX,clientY:t.clientY});},{passive:false});
}
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',()=>{if(canvas)resize();});
function loop(ts){if(!gameRunning)return;updateBubbles(ts);drawBubbles();animFrame=requestAnimationFrame(loop);}

// ══════════════════════════════════════════
//  BUBBLES
// ══════════════════════════════════════════
function weightedBubble(){const total=BUBBLE_TYPES.reduce((s,t)=>s+t.weight,0);let r=Math.random()*total;for(const t of BUBBLE_TYPES){r-=t.weight;if(r<=0)return t;}return BUBBLE_TYPES[0];}
function updateBubbles(ts){
  const cafeH=document.getElementById('cafeBg').offsetHeight||200;
  const hudH=document.querySelector('.hud').offsetHeight||60;
  const spawnRate=Math.max(280,900-score*0.35);
  if(ts-lastSpawn>spawnRate){
    const type=weightedBubble();const r=clamp(26+Math.random()*18,26,50);
    bubbles.push({x:clamp(r+Math.random()*(W-2*r),r,W-r),y:H-cafeH+10,r,speed:1.1+Math.random()*1.3,wobble:Math.random()*Math.PI*2,type,scale:1,opacity:1,popping:false,popP:0});
    lastSpawn=ts;
  }
  for(let i=bubbles.length-1;i>=0;i--){
    const b=bubbles[i];
    if(b.popping){b.popP+=0.11;b.opacity=1-b.popP;b.scale=1+b.popP*0.55;if(b.popP>=1){bubbles.splice(i,1);continue;}}
    else{b.y-=b.speed;b.wobble+=0.038;b.x+=Math.sin(b.wobble)*0.55;b.x=clamp(b.x,b.r,W-b.r);if(b.y+b.r<hudH)bubbles.splice(i,1);}
  }
}
function drawBubbles(){
  ctx.clearRect(0,0,W,H);
  for(const b of bubbles){
    ctx.save();ctx.globalAlpha=b.opacity;ctx.translate(b.x,b.y);ctx.scale(b.scale,b.scale);
    const grd=ctx.createRadialGradient(0,0,b.r*0.1,0,0,b.r*1.4);grd.addColorStop(0,b.type.glow+'44');grd.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(0,0,b.r*1.4,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    const bg=ctx.createRadialGradient(-b.r*0.22,-b.r*0.28,0,0,0,b.r);bg.addColorStop(0,'#fff');bg.addColorStop(0.3,b.type.color+'CC');bg.addColorStop(1,b.type.color+'80');
    ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
    ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.strokeStyle=b.type.glow+'77';ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(-b.r*0.26,-b.r*0.3,b.r*0.17,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fill();
    ctx.font=`${b.r*0.9}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(b.type.emoji,0,b.r*0.07);
    ctx.restore();
  }
}
function onTap(e){
  if(!gameRunning)return;
  const rect=canvas.getBoundingClientRect();const tx=e.clientX-rect.left,ty=e.clientY-rect.top;
  for(let i=bubbles.length-1;i>=0;i--){const b=bubbles[i];if(b.popping)continue;const dx=tx-b.x,dy=ty-b.y;if(dx*dx+dy*dy<=b.r*b.r){popBubble(b,tx,ty);return;}}
  combo=0;document.getElementById('comboEl').style.opacity='0';
}
function popBubble(b,tx,ty){
  b.popping=true;bubblesPopped++;const tp=b.type;
  if(tp.special==='time'){timeLeft=Math.min(timeLeft+5,120);showScorePop(tx,ty,t().timePlus);spawnParticles(tx,ty,'#D0B0FF',7);playPop('moody');updateHUD();}
  else if(tp.special==='heart'){guests.forEach(g=>{if(g){g.happy=Math.min(g.maxHappy,g.happy+1);updateGuestHappy(g);}});updateCafeHappy();showScorePop(tx,ty,t().allHappy);spawnParticles(tx,ty,'#FFB3D4',10);playPop('heart');}
  else if(tp.special==='combo'){combo=Math.max(combo,1)*2;if(combo>maxCombo)maxCombo=combo;showScorePop(tx,ty,`🐈 COMBO x${combo}!`);spawnParticles(tx,ty,'#FFC8A0',8);playPop('calico');playPop('combo');showCombo();}
  else if(tp.special==='event'){const evs=t().eventMsgs;const ev=evs[Math.floor(Math.random()*evs.length)];const pts=ev.includes('30')?30:ev.includes('20')?20:50;score+=pts;updateHUD();showScorePop(tx,ty,ev);spawnParticles(tx,ty,'#B0F0D0',9);playPop('random');}
  else{
    if(tp.type==='water')ingr.w=Math.min(5,ingr.w+1);
    else if(tp.type==='tuna')ingr.t=Math.min(5,ingr.t+1);
    else if(tp.type==='wet')ingr.f=Math.min(5,ingr.f+1);
    updateIngrUI();combo++;if(combo>maxCombo)maxCombo=combo;
    const pts=10*Math.max(1,combo);score+=pts;updateHUD();
    showScorePop(tx,ty,`+${pts}`);spawnParticles(tx,ty,tp.glow,5);playPop(tp.type);showCombo();tryServe();
  }
  clearTimeout(comboTimer);comboTimer=setTimeout(()=>{combo=0;document.getElementById('comboEl').style.opacity='0';},1500);
}
function showCombo(){if(combo<2)return;const el=document.getElementById('comboEl');el.textContent=`🔥 COMBO x${combo}!`;el.style.opacity='1';}
function updateHUD(){
  document.getElementById('scoreEl').textContent=score.toLocaleString();
  document.getElementById('bestEl').textContent=Math.max(score,bestScore).toLocaleString();
  const td=document.getElementById('timerEl');td.textContent=timeLeft;td.classList.toggle('red',timeLeft<=10);
}

// ══════════════════════════════════════════
//  END
// ══════════════════════════════════════════
function endGame(){
  stopGame();
  const isNew=score>bestScore;if(isNew)bestScore=score;writeSave();
  const avg=guests.length?guests.reduce((s,g)=>s+(g?g.happy:0),0)/(guests.length*5):0;
  const happyPct=Math.round(avg*100);
  const hearts='♥'.repeat(Math.round(avg*5))+'♡'.repeat(5-Math.round(avg*5));
  const bestGuest=[...guests].filter(Boolean).sort((a,b)=>b.totalServed-a.totalServed)[0];
  const bestName=bestGuest?bestGuest.name:(lang==='ko'?CAT_NAMES_KO[0]:CAT_NAMES_EN[0]);
  const quotes=t().catQuotes;
  const L=t();
  const cats=score>=1500?['😻','🥰']:score>=800?['😸','😺']:['🐱','😊'];
  const titles=score>=1500?L.resTitles.great:score>=800?L.resTitles.good:L.resTitles.normal;
  document.getElementById('resCat').textContent=cats[Math.floor(Math.random()*cats.length)];
  document.getElementById('resTitle').textContent=titles[Math.floor(Math.random()*titles.length)];
  document.getElementById('resScore').textContent=score.toLocaleString();
  document.getElementById('rHappy').textContent=`${hearts} (${happyPct}%)`;
  document.getElementById('rServe').textContent=`${serveCount}${L.serveUnit}`;
  document.getElementById('rBubble').textContent=`${bubblesPopped}${L.bubbleUnit}`;
  document.getElementById('rCombo').textContent=`x${maxCombo}`;
  document.getElementById('rLeft').textContent=`${guestsLeft}${L.guestUnit}`;
  document.getElementById('bestGuestName').textContent=bestName;
  document.getElementById('bestGuestQuote').textContent=`"${quotes[Math.floor(Math.random()*quotes.length)]}"`;
  document.getElementById('newBest').classList.toggle('hidden',!isNew);
  showScreen('resultScreen');
}

function showScorePop(x,y,text){const el=document.createElement('div');el.className='score-pop';el.textContent=text;el.style.cssText=`left:${x-24}px;top:${y-16}px;`;document.body.appendChild(el);setTimeout(()=>el.remove(),950);}
function showServePop(seat,text){const r=seat.getBoundingClientRect();const el=document.createElement('div');el.className='serve-pop';el.textContent=text;el.style.cssText=`left:${r.left+r.width/2-30}px;top:${r.top-10}px;`;document.body.appendChild(el);setTimeout(()=>el.remove(),1100);}
function spawnParticles(x,y,color,n){for(let i=0;i<n;i++){const el=document.createElement('div');el.className='particle';const sz=5+Math.random()*7;const angle=Math.random()*Math.PI*2;const dist=35+Math.random()*55;el.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${color};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--d:${0.45+Math.random()*0.35}s;`;document.body.appendChild(el);setTimeout(()=>el.remove(),850);}}
// ══════════════════════════════════════════
//  AUDIO ENGINE
// ══════════════════════════════════════════
let audioCtx = null;
// BGM 변수 제거됨
let isMuted = false;
// BGM 제거됨

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // suspended 상태면 resume (브라우저 자동재생 차단 해제)
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// 화면 터치/클릭 시 오디오 컨텍스트 깨우기
function unlockAudio() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('touchstart', unlockAudio, {passive:true});
document.addEventListener('click', unlockAudio);

function playBGM() { /* BGM 제거됨 */ }

function stopBGM() {}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
}

// 뽁뽁 버블 효과음
function playPop(type) {
  if (isMuted) return;
  try {
    const ac = getAC();
    const t = ac.currentTime;

    if (type === 'water') {
      // 뽁! - 통통 버블
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(520, t);
      o.frequency.exponentialRampToValueAtTime(180, t + 0.12);
      g.gain.setValueAtTime(0.22, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
      o.start(t); o.stop(t + 0.14);
      // 잔향
      const o2 = ac.createOscillator(), g2 = ac.createGain();
      o2.connect(g2); g2.connect(ac.destination);
      o2.type = 'sine';
      o2.frequency.setValueAtTime(900, t + 0.01);
      o2.frequency.exponentialRampToValueAtTime(300, t + 0.08);
      g2.gain.setValueAtTime(0.08, t + 0.01);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      o2.start(t + 0.01); o2.stop(t + 0.1);

    } else if (type === 'tuna') {
      // 뽀뽁! - 더 통통
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(680, t);
      o.frequency.exponentialRampToValueAtTime(220, t + 0.15);
      g.gain.setValueAtTime(0.25, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      o.start(t); o.stop(t + 0.18);
      const o2 = ac.createOscillator(), g2 = ac.createGain();
      o2.connect(g2); g2.connect(ac.destination);
      o2.type = 'triangle';
      o2.frequency.setValueAtTime(1100, t);
      o2.frequency.exponentialRampToValueAtTime(400, t + 0.1);
      g2.gain.setValueAtTime(0.1, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      o2.start(t); o2.stop(t + 0.12);

    } else if (type === 'wet') {
      // 뽀옹~ - 묵직하게
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(320, t);
      o.frequency.exponentialRampToValueAtTime(100, t + 0.22);
      g.gain.setValueAtTime(0.28, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.start(t); o.stop(t + 0.25);

    } else if (type === 'moody') {
      // 삐융~ 토라진 느낌
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(200, t);
      o.frequency.linearRampToValueAtTime(600, t + 0.08);
      o.frequency.exponentialRampToValueAtTime(150, t + 0.25);
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
      o.start(t); o.stop(t + 0.28);

    } else if (type === 'heart') {
      // 띵동~ 차임벨
      const notes = [523, 659, 784];
      notes.forEach((freq, i) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'sine';
        o.frequency.value = freq;
        g.gain.setValueAtTime(0, t + i * 0.1);
        g.gain.linearRampToValueAtTime(0.18, t + i * 0.1 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.4);
        o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.4);
      });

    } else if (type === 'calico') {
      // 뿅! 경쾌하게
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'square';
      o.frequency.setValueAtTime(800, t);
      o.frequency.exponentialRampToValueAtTime(1400, t + 0.05);
      o.frequency.exponentialRampToValueAtTime(200, t + 0.15);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      o.start(t); o.stop(t + 0.18);

    } else if (type === 'random') {
      // 냥~ 귀여운 랜덤
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(440, t);
      o.frequency.linearRampToValueAtTime(660, t + 0.1);
      o.frequency.linearRampToValueAtTime(550, t + 0.2);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.start(t); o.stop(t + 0.25);

    } else if (type === 'serve') {
      // 딩동댕~ 서빙 성공
      const notes = [659, 784, 988, 784];
      notes.forEach((freq, i) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'sine';
        o.frequency.value = freq;
        g.gain.setValueAtTime(0, t + i * 0.09);
        g.gain.linearRampToValueAtTime(0.15, t + i * 0.09 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.09 + 0.35);
        o.start(t + i * 0.09); o.stop(t + i * 0.09 + 0.35);
      });

    } else if (type === 'combo') {
      // 올라가는 음계 콤보!
      const scale = [262, 330, 392, 523, 659];
      const steps = Math.min(combo, scale.length);
      for (let i = 0; i < steps; i++) {
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = 'triangle';
        o.frequency.value = scale[i];
        g.gain.setValueAtTime(0, t + i * 0.06);
        g.gain.linearRampToValueAtTime(0.14, t + i * 0.06 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.2);
        o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.2);
      }
    }
  } catch(e) {}
}
function clamp(v,a,b){return Math.min(b,Math.max(a,v));}
